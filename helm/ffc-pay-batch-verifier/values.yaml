environment: development
environmentCode:
name: ffc-pay-batch-verifier
namespace: ffc-pay
workstream: ffc-pay
image: ffc-pay-batch-verifier

labels: {}

appInsights:
  connectionString:

containerConfigMap:
  name: ffc-pay-batch-verifier-config-map

containerSecret:
  name: ffc-pay-batch-verifier
  type: Opaque

deployment:
  priorityClassName: high

container:
  requestMemory: 150Mi
  requestCpu: 150m
  limitMemory: 300Mi
  limitCpu: 300m
  azureStorageAccountName: ffcpay
  azureStorageConnectionString: dummy
  azureStorageUseConnectionString: false
  azureStorageCreateContainers: false
  pollingInterval: 10000
  pollingActive: true

workloadIdentity: true

azureIdentity:
  clientID: not-a-real-clientID
  resourceID: not-a-real-resourceID

secretProviderClass:
  azure:
    keyvaultName: SNDFFCINFKV2001
    objects: # reading the secret from Azure Key Vault
      - objectName: appInsights-connectionString # secret name in Azure Key Vault
        objectType: secret

  secretObjects: # creating a kubernetes secret from the Azure Key Vault secrets
    - secretName: ffc-pay-batch-verifier
      type: Opaque
      data:
        - objectName: appInsights-connectionString
          key: APPINSIGHTS_CONNECTIONSTRING